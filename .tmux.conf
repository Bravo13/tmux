unbind-key C-b
set -g prefix C-a
bind C-a send-prefix

# ask name on each new window
bind-key c command-prompt -p "Window name:" "new-window -n '%%'"

# ask name on each new pane (the name is exposed to the shell via PANE_NAME)
bind-key % command-prompt -p "Pane name:" "split-window -h -e 'PANE_NAME=%%'"
bind-key '"' command-prompt -p "Pane name:" "split-window -v -e 'PANE_NAME=%%'"

# Prompt for a name for the first window when a session is created
# Prompt for a name for the first window when a session is created
set-hook -g session-created 'command-prompt -p "Window name:" "rename-window '\''%%'\''"'

set -g default-terminal "screen-256color"

#### COLOUR (Solarized 256) -- modern *-style options

# default statusbar
set-option -g status-style bg=colour235,fg=colour136

# window titles
set-window-option -g window-status-style fg=colour244,bg=default
set-window-option -g window-status-current-style fg=colour166,bg=default

# pane borders
set-option -g pane-border-style fg=colour235
set-option -g pane-active-border-style fg=colour240

# messages
set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166

# windows start from 1
set -g base-index 1
set -g pane-base-index 1

# mouse (replaces old mode-mouse)
set -g mouse on

# scroll-back history
set -g history-limit 10000

# clock
set-window-option -g clock-mode-colour colour64

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# resurrect plugin
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save-shell-history 'on'

run '~/.tmux/plugins/tpm/tpm'